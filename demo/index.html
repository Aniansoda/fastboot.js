<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>SHARK OS | 川上富江</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-gold: #d4af37;
            --ios-blur: blur(25px);
            --bg-dark: #050505;
            --glass-white: rgba(255, 255, 255, 0.04);
            --accent-red: #ff3b30;
            --material-shadow: 0 12px 40px rgba(0, 0, 0, 0.9);
            --progress-gradient: linear-gradient(90deg, #8b0000, #d4af37);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: white; font-family: -apple-system, "SF Pro Display", sans-serif;
            scroll-behavior: smooth;
        }

        /* 修复后的动态背景 */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }
        .blob {
            position: absolute; width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, rgba(255,0,0,0.05) 100%);
            border-radius: 50%; filter: blur(80px);
            animation: move 20s infinite alternate ease-in-out;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(30%, 30%) scale(1.1); }
        }

        /* 主容器 */
        .scroller {
            max-width: 500px; margin: 0 auto;
            padding: 40px 20px 100px 20px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 200; letter-spacing: 6px; color: var(--primary-gold); margin: 0; }
        .author { font-size: 10px; color: var(--accent-red); letter-spacing: 3px; margin-top: 5px; }

        /* 卡片设计 */
        .card {
            background: var(--glass-white); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px;
            padding: 24px; margin-bottom: 25px; box-shadow: var(--material-shadow);
        }

        h2 { font-size: 13px; font-weight: 400; color: #888; text-transform: uppercase; margin: 0 0 12px 5px; letter-spacing: 1px; }

        /* 信息网格 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .info-label { font-size: 9px; color: #666; margin-bottom: 4px; }
        .info-value { font-size: 13px; color: #eee; font-family: monospace; }

        /* 按钮 */
        .btn {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; font-weight: 600;
            margin-top: 10px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:active { transform: scale(0.96); }
        .btn-gold { border-color: var(--primary-gold); color: var(--primary-gold); }

        .brand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 14px; color: white; margin-bottom: 12px; box-sizing: border-box;
        }

        /* 进度条 */
        .prog-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 15px; overflow: hidden; display: none; }
        .prog-bar { height: 100%; width: 0%; background: var(--progress-gradient); transition: width 0.3s; }

        /* 终端 */
        .terminal {
            background: rgba(0,0,0,0.5); border-radius: 18px; padding: 15px;
            font-family: 'Cascadia Code', monospace; font-size: 11px;
            color: #00ff41; height: 160px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="liquid-bg"><div class="blob"></div></div>

    <div class="scroller">
        <header>
            <h1>SHARK OS</h1>
            <div class="author">BY TOMIE KAWAKAMI - 川上富江</div>
        </header>

        <h2>Status</h2>
        <div class="card">
            <div style="margin-bottom: 15px; font-size: 13px;">
                机魂感应: <span id="status-text" style="color:var(--accent-red)">未连接</span>
            </div>
            <div class="info-grid">
                <div class="info-item"><div class="info-label">PRODUCT</div><div id="info-prod" class="info-value">-</div></div>
                <div class="info-item"><div class="info-label">SERIAL</div><div id="info-seri" class="info-value">-</div></div>
                <div class="info-item"><div class="info-label">CPU</div><div id="info-cpu" class="info-value">-</div></div>
                <div class="info-item"><div class="info-label">LOCK</div><div id="info-lock" class="info-value">-</div></div>
            </div>
            <button class="btn btn-gold" id="connect-btn">唤醒设备</button>
        </div>

        <h2>Root Protocol</h2>
        <div class="card" style="border-left: 3px solid var(--accent-red);">
            <div style="font-size: 12px; color: #888; margin-bottom: 10px;">KernelSU 宽容内核注入</div>
            <button class="btn" id="root-btn">执行提权协议</button>
        </div>

        <h2>Unlock Contract</h2>
        <div class="card">
            <div class="brand-grid">
                <button class="btn" onclick="handleUnlock('xiaomi')" style="font-size: 12px;">Xiaomi</button>
                <button class="btn" onclick="handleUnlock('oneplus')" style="font-size: 12px;">OnePlus</button>
                <button class="btn" onclick="handleUnlock('redmagic')" style="font-size: 12px;">RedMagic</button>
                <button class="btn" onclick="handleUnlock('samsung')" style="font-size: 12px;">Samsung</button>
            </div>
        </div>

        <h2>Soul Infusion</h2>
        <div class="card">
            <div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
            <input type="text" id="part-input" placeholder="目标分区 (例如: boot)">
            <input type="file" id="file-input">
            <button class="btn btn-gold" id="flash-btn">开始同步</button>
        </div>

        <h2>Terminal</h2>
        <div class="card" style="padding: 12px;">
            <div class="terminal" id="log-output">READY...</div>
        </div>
    </div>

    <script type="module">
        import { FastbootDevice } from "./ui.js"; 
        // 确保你的 ui.js 中导出了 FastbootDevice 并且逻辑正确
        
        const logOutput = document.getElementById('log-output');
        function log(m) {
            const time = new Date().toLocaleTimeString();
            logOutput.innerHTML += `<div><span style="opacity:0.5">[${time}]</span> ${m}</div>`;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        log("系统环境已就绪");
    </script>
</body>
</html>
