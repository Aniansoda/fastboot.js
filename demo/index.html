<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>SHARK OS | 川上富江</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-gold: #d4af37;
            --ios-blur: blur(25px);
            --bg-dark: #050505;
            --glass-white: rgba(255, 255, 255, 0.03);
            --accent-red: #ff3b30;
            --material-shadow: 0 12px 40px rgba(0, 0, 0, 0.9);
            --progress-gradient: linear-gradient(90deg, #8b0000, #d4af37);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-dark);
            color: white;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            overflow: hidden;
        }

        /* 液态背景层 */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000;
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, rgba(255,0,0,0.05) 100%);
            border-radius: 50%; filter: blur(100px);
            animation: move 25s infinite alternate ease-in-out;
        }
        @keyframes move {
            from { transform: translate(-30%, -30%) scale(1); }
            to { transform: translate(50%, 50%) scale(1.2); }
        }

        /* 导航 */
        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; height: 70px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: var(--material-shadow);
        }
        .nav-item { cursor: pointer; color: #666; transition: 0.4s; text-align: center; }
        .nav-item.active { color: var(--primary-gold); transform: translateY(-5px); }

        /* 页面切换 */
        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; padding: 20px; box-sizing: border-box;
            overflow-y: auto; padding-bottom: 120px;
        }
        .page.active { display: block; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* 玻璃卡片 */
        .card {
            background: var(--glass-white);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h1 { font-weight: 200; letter-spacing: 4px; text-align: center; color: var(--primary-gold); margin-top: 40px; }
        .author-info { text-align: center; font-size: 11px; color: var(--accent-red); margin-top: -10px; margin-bottom: 40px; letter-spacing: 2px; }

        /* 设备信息格 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .info-item { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .info-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .info-value { font-size: 13px; color: #ddd; margin-top: 4px; font-family: monospace; }

        /* 进度条 */
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; display: none;}
        .progress-bar { width: 0%; height: 100%; background: var(--progress-gradient); transition: width 0.3s; box-shadow: 0 0 10px var(--accent-red); }

        /* 按钮 */
        .btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.06); color: white;
            font-weight: 600; margin: 10px 0; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(212,175,55,0.2);
        }
        .btn:hover { background: rgba(212,175,55,0.1); border-color: var(--primary-gold); }
        .btn:active { transform: scale(0.97); }

        /* 免责声明 Overlay */
        #disclaimer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 16px; color: white; margin: 12px 0; box-sizing: border-box;
        }

        .console {
            background: rgba(0,0,0,0.6); font-family: "Cascadia Code", monospace;
            font-size: 11px; padding: 18px; border-radius: 20px;
            color: #00ff41; height: 180px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="liquid-bg"><div class="blob"></div></div>

    <div id="home" class="page active">
        <h1>SHARK OS</h1>
        <div class="author-info">BY TOMIE KAWAKAMI</div>
        
        <div class="card">
            <h3 style="margin-top:0; font-weight: 300;">实体状态: <span id="status-text" style="color:var(--accent-red)">未连接</span></h3>
            <div class="info-grid">
                <div class="info-item"><div class="info-label">Product</div><div id="info-prod" class="info-value">None</div></div>
                <div class="info-item"><div class="info-label">Serial</div><div id="info-seri" class="info-value">None</div></div>
                <div class="info-item"><div class="info-label">CPU</div><div id="info-cpu" class="info-value">None</div></div>
                <div class="info-item"><div class="info-label">Unlocked</div><div id="info-lock" class="info-value">None</div></div>
            </div>
            <button class="btn" id="connect-btn" style="margin-top: 20px; border-color: var(--primary-gold);">唤醒设备</button>
        </div>

        <div class="card" style="background: rgba(255, 59, 48, 0.05); border-left: 4px solid var(--accent-red);">
            <h3 style="color:var(--accent-red); margin-top:0">SHARK ROOT</h3>
            <p style="font-size: 12px; color:#888">自动化宽容内核模式，通向 Root 的捷径</p>
            <button class="btn" id="root-btn">执行提权协议</button>
        </div>
    </div>

    <div id="unlock" class="page">
        <h1>契约解锁</h1>
        <div class="card">
            <p style="font-size: 13px; color:#888">针对不同品牌发送特定的引导解锁指令</p>
            <button class="btn" onclick="handleUnlock('xiaomi')">MIUI/HyperOS</button>
            <button class="btn" onclick="handleUnlock('oneplus')">OnePlus/OPPO</button>
            <button class="btn" onclick="handleUnlock('redmagic')">Nubia/RedMagic</button>
            <button class="btn" onclick="handleUnlock('samsung')">Samsung Download</button>
        </div>
    </div>

    <div id="flash" class="page">
        <h1>灵魂灌注</h1>
        <div class="card">
            <div class="progress-container" id="prog-wrap"><div class="progress-bar" id="prog-bar"></div></div>
            <input type="text" id="part-input" placeholder="目标分区 (如: boot)">
            <input type="file" id="file-input">
            <button class="btn" id="flash-btn" style="color:var(--primary-gold)">开始同步</button>
        </div>
        <div class="card">
            <div class="console" id="log-output">终端初始化...</div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchPage('home', this)"><div>🏠</div><div style="font-size: 10px;">状态</div></div>
        <div class="nav-item" onclick="switchPage('unlock', this)"><div>🔓</div><div style="font-size: 10px;">解锁</div></div>
        <div class="nav-item" onclick="switchPage('flash', this)"><div>🔥</div><div style="font-size: 10px;">刷写</div></div>
    </nav>

    <script type="module">
        import { FastbootDevice } from "./ui.js"; 

        const device = new FastbootDevice();

        // 免责声明处理
        window.acceptTerms = () => {
            document.getElementById('disclaimer-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('disclaimer-overlay').style.display = 'none', 500);
        };

        // 页面切换
        window.switchPage = (pageId, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        };

        // 自动读取信息逻辑
        async function fetchDeviceInfo() {
            try {
                const prod = await device.getVariable("product");
                const seri = await device.getVariable("serialno");
                const cpu = await device.getVariable("cpu");
                const lock = await device.getVariable("unlocked");

                document.getElementById('info-prod').innerText = prod || "Unknown";
                document.getElementById('info-seri').innerText = seri || "Unknown";
                document.getElementById('info-cpu').innerText = cpu || "Unknown";
                document.getElementById('info-lock').innerText = lock === "yes" ? "Unlocked" : "Locked";
                
                document.getElementById('status-text').innerText = "已就绪";
                document.getElementById('status-text').style.color = "var(--primary-gold)";
            } catch (e) {
                console.log("读取变量失败");
            }
        }

        // 进度条控制
        window.updateProgress = (val) => {
            const wrap = document.getElementById('prog-wrap');
            const bar = document.getElementById('prog-bar');
            wrap.style.display = 'block';
            bar.style.width = val + '%';
            if(val >= 100) setTimeout(() => wrap.style.display = 'none', 1000);
        };

        // 绑定按钮
        document.getElementById('connect-btn').onclick = async () => {
            await device.connect();
            await fetchDeviceInfo();
            log("设备已连接，变量同步完成。");
        };

        const logOutput = document.getElementById('log-output');
        function log(m) {
            logOutput.innerHTML += `<div><span style="color:var(--primary-gold)">[TOMIE]</span> ${m}</div>`;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        log("川上富江版 SHARK OS 环境就绪");
    </script>
</body>
</html>
